<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="bg-noise"></div>
  <div class="container">
    <header class="header">
      <div class="logo-row">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="5" y="11" width="14" height="11" rx="2" fill="url(#lockGrad)" />
            <path d="M8 11V7a4 4 0 1 1 8 0v4" stroke="url(#lockGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
            <circle cx="12" cy="16" r="1.5" fill="#0a0a0a" />
            <defs>
              <linearGradient id="lockGrad" x1="5" y1="7" x2="19" y2="22">
                <stop offset="0%" stop-color="#ff3333" />
                <stop offset="100%" stop-color="#ff6b4a" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="logo-text">YTLock</h1>
      </div>
      <div class="count" id="count">
        <span class="count-num" id="count-num">0</span>
        <span class="count-label">blocked</span>
      </div>
    </header>

    <div class="input-group">
      <input type="text" id="channel-input" placeholder="@handle or channel URL" spellcheck="false" />
      <button id="block-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="8" y1="8" x2="16" y2="16" />
        </svg>
      </button>
    </div>

    <div class="toggle-section">
      <label class="toggle-row">
        <div class="toggle-switch">
          <input type="checkbox" id="block-shorts" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </div>
        <span class="toggle-label">Block all Shorts</span>
      </label>
      <label class="toggle-row">
        <div class="toggle-switch">
          <input type="checkbox" id="block-live-chat" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </div>
        <span class="toggle-label">Disable live chat</span>
      </label>
    </div>

    <a href="#" id="manage-link" class="manage-link">
      <span>Manage blocklist</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 17L17 7" /><path d="M7 7h10v10" />
      </svg>
    </a>
  </div>
  <script src="lib/ytlock-shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
